<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery 📸</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
</head>
<body class="page3-body">

  <!-- Music Player -->
  <div class="music-player" id="musicPlayer">
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle Music">
      <span id="musicIcon">🎵</span>
      <span id="musicLabel">Music</span>
    </button>
  </div>

  <!-- Back Button -->
  <a href="page2.html" class="back-btn">← Back</a>

  <!-- Background: gentle gradient with floating petals -->
  <div class="petals-bg" id="petalsBg"></div>

  <!-- Page 3 Content -->
  <main class="page3-main">
    <h2 class="gallery-title">Our Memories Together 📷</h2>
    <p class="gallery-subtitle">A few of our favorite moments with you, Mom 💜</p>

    <!-- Before Gallery Opens -->
    <div id="galleryIntro">
      <button class="view-gallery-btn" onclick="openGallery()">
        🖼️ View Gallery
      </button>
    </div>

    <!-- Gallery Grid (hidden until button pressed) -->
    <div class="gallery-grid" id="galleryGrid"></div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-back" onclick="closeLightbox()">← Back</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="Full view" />
  </div>

  <audio id="bgMusic" loop>
    <source src="music/birthday.mp3" type="audio/mpeg" />
  </audio>

  <script src="music.js"></script>
  <script>
    // 10 image paths — user replaces with actual photos
    const images = [
      'images/photo1.jpg',
      'images/photo2.jpg',
      'images/photo3.jpg',
      'images/photo4.jpg',
      'images/photo5.jpg',
      'images/photo6.jpg',
      'images/photo7.jpg',
      'images/photo8.jpg',
      'images/photo9.jpg',
      'images/photo10.jpg',
    ];

    const captions = [
      'Always our sunshine ☀️',
      'The heart of our home 💜',
      'Your smile, our joy 😊',
      'Family is everything 🏠',
      'Moments like these 🌸',
      'Our guiding star ⭐',
      'So much love 💖',
      'Cherished memories 📷',
      'Thank you, Mi 🙏',
      'We love you forever ♾️',
    ];

    function openGallery() {
      document.getElementById('galleryIntro').style.display = 'none';
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';

      images.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.style.animationDelay = (i * 0.07) + 's';

        const img = document.createElement('img');
        img.src = src;
        img.alt = captions[i];
        img.onerror = function() {
          // Fallback placeholder if image not found
          this.parentElement.innerHTML = `
            <div class="img-placeholder">
              <span>📷</span>
              <small>Photo ${i + 1}</small>
            </div>`;
        };

        const cap = document.createElement('div');
        cap.className = 'gallery-caption';
        cap.textContent = captions[i];

        item.appendChild(img);
        item.appendChild(cap);
        item.addEventListener('click', () => openLightbox(src, captions[i]));
        grid.appendChild(item);
      });

      grid.style.display = 'grid';
    }

    function openLightbox(src, caption) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      img.src = src;
      img.alt = caption;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (!e || e.target !== document.getElementById('lightboxImg')) {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    // Generate floating petal divs
    (function createPetals() {
      const container = document.getElementById('petalsBg');
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (6 + Math.random() * 8) + 's';
        p.style.animationDelay = (-Math.random() * 10) + 's';
        p.style.opacity = 0.3 + Math.random() * 0.5;
        p.style.fontSize = (14 + Math.random() * 18) + 'px';
        p.textContent = ['🌸','🌺','💮','🌼','✿'][Math.floor(Math.random() * 5)];
        container.appendChild(p);
      }
    })();
  </script>
</body>
</html>
